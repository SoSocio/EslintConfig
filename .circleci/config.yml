version: 2.1

parameters:
  image-name:
    type: string
    default: eslint-config
  working-directory:
    type: string
    default: workspace

orbs:
  circleci-pipeline-orbs: sosocio/circleci-pipeline-orbs@2.6.0

filters: &filters
  branches:
    ignore: /.*/
  tags:
    only: /^v.*/

commands:
  manage-build-and-publish:
    description: "Reusable command build stage to enable dry run on commit and publish on tag"
    parameters:
      package-script:
        description: "Package script to run: pack for dry-run validation or pub for release publishing"
        type: string
        default: "pack"
      circle-tag:
        type: string
        default: ""
      publish-target:
        description: "Which package to build/publish: base | frontend | backend (required for tag workflow)"
        type: string
        default: ""
    steps:
      - circleci-pipeline-orbs/pre-run-docker-image-steps:
          image-name: <<pipeline.parameters.image-name>>
          working-directory: <<pipeline.parameters.working-directory>>
      - circleci-pipeline-orbs/export-ci-env-variables
      - run:
          name: Build and Publish Package
          command: |
            docker run --env-file ./.ci.env \
              --name "<<pipeline.parameters.image-name>>" \
              -it "<<pipeline.parameters.image-name>>" \
              sh -l -c "export CIRCLE_TAG=\"<<parameters.circle-tag>>\" && \
              export PUBLISH_TARGET=\"<<parameters.publish-target>>\" && \
              cd /home/app && \
              pnpm run <<parameters.package-script>>"

jobs:
  setup:
    executor:
      name: circleci-pipeline-orbs/node-executor
    steps:
      - add_ssh_keys
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - circleci-pipeline-orbs/build-docker-image:
          image-name: <<pipeline.parameters.image-name>>
      - circleci-pipeline-orbs/export-ci-env-variables
      - circleci-pipeline-orbs/run-docker-container:
          image-name: <<pipeline.parameters.image-name>>
      - circleci-pipeline-orbs/export-docker-image:
          image-name: <<pipeline.parameters.image-name>>
      - persist_to_workspace:
          root: .
          paths:
            - docker-image

  build-and-test-publish:
    executor:
      name: circleci-pipeline-orbs/node-executor
    steps:
      - manage-build-and-publish:
          package-script: "pack"

  publish-base:
    executor:
      name: circleci-pipeline-orbs/node-executor
    steps:
      - manage-build-and-publish:
          package-script: "pub"
          circle-tag: $CIRCLE_TAG
          publish-target: "base"

  publish-frontend:
    executor:
      name: circleci-pipeline-orbs/node-executor
    steps:
      - manage-build-and-publish:
          package-script: "pub"
          circle-tag: $CIRCLE_TAG
          publish-target: "frontend"

  publish-backend:
    executor:
      name: circleci-pipeline-orbs/node-executor
    steps:
      - manage-build-and-publish:
          package-script: "pub"
          circle-tag: $CIRCLE_TAG
          publish-target: "backend"

workflows:
  commit:
    jobs:
      - setup:
          context:
            - github-read-access
      - build-and-test-publish:
          context:
            - github-packages
          requires:
            - setup

  tag:
    jobs:
      - setup:
          filters: *filters
          context:
            - github-packages
      - request-publish-package:
          filters: *filters
          type: approval
          requires:
            - setup
      - publish-base:
          filters: *filters
          context:
            - github-packages
          requires:
            - request-publish-package
      - publish-frontend:
          filters: *filters
          context:
            - github-packages
          requires:
            - publish-base
      - publish-backend:
          filters: *filters
          context:
            - github-packages
          requires:
            - publish-base
